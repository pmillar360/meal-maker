services:
  backend:
    build: ./backend
    container_name: meal-maker-backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped 

  frontend:
    build: ./frontend
    container_name: meal-maker-frontend
    expose:
      - "3000"
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env